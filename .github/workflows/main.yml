name: Update School Menu

on:
  schedule:
    - cron: '0 0 * * 1' # 매주 월요일 오전 9시 (KST)
  workflow_dispatch:   # 수동 실행 버튼

permissions: # 권한 설정을 YAML에도 명시해줍니다
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4 # v3에서 v4로 업그레이드
      - name: Set up Python
        uses: actions/setup-python@v5 # v4에서 v5로 업그레이드
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: pip install pandas beautifulsoup4
      - name: Run script
        run: python 학식.py
      - name: Deploy Changes
        run: |
          git config --global user.name 'github-actions'
          git config --global user.email 'github-actions@github.com'
          git add index.html
          git commit -m "Auto update menu" || exit 0
          git push
